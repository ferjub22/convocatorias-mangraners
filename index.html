<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CD Mangraners - Creador de Convocatorias</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="styles.css">
  
  <!-- External Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

  <!-- App Header -->
  <header class="app-header">
    <div class="app-brand">
      <img src="logo_club.jpg" alt="CD Mangraners Logo" class="app-logo" onerror="this.src='logo_club.png';">
      <div class="app-title-block">
        <h1 class="app-title">CD Mangraners</h1>
        <span class="app-subtitle">Planificador de Convocatorias</span>
      </div>
    </div>
    <div class="app-status-badge">Portal del Entrenador</div>
  </header>

  <!-- Dashboard Container -->
  <div class="dashboard-container">
    
    <!-- Sidebar Form Controls -->
    <aside class="form-panel">
      
      <!-- Voice Dictation Assistant Card -->
      <div class="voice-assistant-card">
        <div class="voice-status">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" x2="12" y1="19" y2="22"/>
          </svg>
          <span id="voice-status-log">Asistente por voz inactivo</span>
        </div>
        <textarea id="voice-text-area" placeholder="Dicta los detalles del partido (Jornada, rival, fecha, convocados...) o pégalos aquí..." rows="3"></textarea>
        <div style="display: flex; gap: 10px;">
          <button type="button" id="btn-voice-start" class="btn btn-gold" style="flex: 1;">Grabar Voz</button>
          <button type="button" id="btn-voice-process" class="btn btn-primary" style="flex: 1;">Procesar Texto</button>
        </div>
      </div>

      <!-- Main Input Form -->
      <form id="convocatoria-form" onsubmit="event.preventDefault();">
        
        <!-- Section 1: Match Data -->
        <div class="form-section">
          <h3 class="form-section-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            Datos del Partido
          </h3>
          <div class="form-grid">
            <div class="form-group">
              <label for="inp-equipo">Equipo</label>
              <select id="inp-equipo">
                <option value="">-- Seleccionar --</option>
                <option value="Benjamí S10">Benjamí S10</option>
                <option value="Aleví S11">Aleví S11</option>
                <option value="Aleví S12">Aleví S12</option>
                <option value="Infantil S14">Infantil S14</option>
                <option value="Cadet S16">Cadet S16</option>
                <option value="Juvenil">Juvenil</option>
                <option value="Quarta Catalana">Quarta Catalana</option>
              </select>
            </div>
            <div class="form-group">
              <label for="inp-jornada">Jornada</label>
              <select id="inp-jornada">
                <option value="">-- Seleccionar --</option>
              </select>
            </div>
            <div class="form-group full-width">
              <label for="inp-categoria">Categoría Oficial</label>
              <select id="inp-categoria">
                <option value="">-- Seleccionar --</option>
                <option value="PRIMERA DIVISIÓ BENJAMÍ S10 (GRUP 13)">PRIMERA DIVISIÓ BENJAMÍ S10 (GRUP 13)</option>
                <option value="SEGONA DIVISIÓ ALEVÍ S11 (GRUP 18)">SEGONA DIVISIÓ ALEVÍ S11 (GRUP 18)</option>
                <option value="SEGONA DIVISIÓ ALEVÍ S12 (GRUP 22)">SEGONA DIVISIÓ ALEVÍ S12 (GRUP 22)</option>
                <option value="INFANTIL SEGONA DIVISIÓ S14 (GRUP 28)">INFANTIL SEGONA DIVISIÓ S14 (GRUP 28)</option>
                <option value="Cadet Segona Divisió S16 - Grup 24">Cadet Segona Divisió S16 - Grup 24</option>
                <option value="JUVENIL SEGONA DIVISIÓ (GRUP 46)">JUVENIL SEGONA DIVISIÓ (GRUP 46)</option>
                <option value="QUARTA CATALANA (GRUP 29)">QUARTA CATALANA (GRUP 29)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="inp-rival">Rival</label>
              <input type="text" id="inp-rival" placeholder="CFJ Mollerussa B">
            </div>
            <div class="form-group">
              <label for="inp-condicion">Condición</label>
              <select id="inp-condicion">
                <option value="Local">Local</option>
                <option value="Visitante">Visitante</option>
              </select>
            </div>
            <div class="form-group">
              <label for="inp-dia">Día del Partido</label>
              <input type="text" id="inp-dia" placeholder="Sábado, 13 de junio de 2026">
            </div>
            <div class="form-group">
              <label for="inp-hora">Hora Partido</label>
              <input type="text" id="inp-hora" placeholder="17:45">
            </div>
            <div class="form-group">
              <label for="inp-llegada">Hora Llegada</label>
              <input type="text" id="inp-llegada" placeholder="16:45">
            </div>
            <div class="form-group">
              <label for="inp-campo">Campo de Juego</label>
              <input type="text" id="inp-campo" placeholder="Camp Municipal de Mollerussa">
            </div>
          </div>
        </div>
        
        <!-- Section 2: Kit and Staff Details -->
        <div class="form-section">
          <h3 class="form-section-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9Z"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            Detalles y Personal
          </h3>
          <div class="form-grid">
            <div class="form-group full-width">
              <label for="inp-equipacion">Equipación Oficial</label>
              <select id="inp-equipacion">
                <option value="">-- Seleccionar --</option>
                <option value="1ª Equipación (Verde/Blanco)">1ª Equipación (Verde/Blanco)</option>
                <option value="2ª Equipación (Negra)">2ª Equipación (Negra)</option>
              </select>
            </div>
            <div class="form-group full-width">
              <label for="inp-cuerpo">Cuerpo Técnico</label>
              <input type="text" id="inp-cuerpo" placeholder="Federico Ferreira y Joel Benitez">
            </div>
          </div>
        </div>

        <!-- Section 3: Squad Call Selection -->
        <div class="form-section">
          <h3 class="form-section-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Jugadores Convocados <span id="conv-limit-info" style="margin-left: auto;">(Límite: 18)</span>
          </h3>
          <div class="player-list-editor">
            <div class="add-player-row">
              <select id="sel-available-conv" style="width: 100%;">
                <option value="">-- Seleccionar jugador para convocar --</option>
              </select>
            </div>
            <div id="convocados-list-container">
              <!-- Rendered dynamically -->
            </div>
          </div>
        </div>

        <!-- Section 4: Non-called Players -->
        <div class="form-section">
          <h3 class="form-section-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="17" y1="8" x2="23" y2="14"/><line x1="23" y1="8" x2="17" y2="14"/>
            </svg>
            Jugadores No Convocados
          </h3>
          <div class="player-list-editor">
            <div class="add-player-row">
              <select id="sel-available-noconv" style="width: 100%;">
                <option value="">-- Seleccionar jugador no convocado --</option>
              </select>
            </div>
            <div id="noconv-list-container">
              <!-- Rendered dynamically -->
            </div>
          </div>
        </div>

        <!-- Section 5: Additional Observations -->
        <div class="form-section">
          <h3 class="form-section-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            Observaciones
          </h3>
          <div class="form-group">
            <textarea id="inp-obs" placeholder="Ropa de presentación, puntualidad, o cualquier otra instrucción técnica..."></textarea>
          </div>
        </div>

        <!-- Toolbar Actions Grid -->
        <div class="action-buttons-grid">
          <button type="button" id="btn-generate" class="btn btn-primary">Generar Convocatoria</button>
          <button type="button" id="btn-load-demo" class="btn btn-secondary">Cargar Ejemplo</button>
          <button type="button" id="btn-download-pdf" class="btn btn-gold">Descargar PDF</button>
          <button type="button" id="btn-clear" class="btn btn-danger">Limpiar Formulario</button>
          <button type="button" id="btn-send-whatsapp" class="btn btn-whatsapp">Compartir WhatsApp</button>
        </div>

      </form>
    </aside>
    
    <!-- Real-time Interactive Preview Pane -->
    <main class="preview-panel" id="preview-panel">
      <div id="preview-scale-wrapper" class="preview-scale-wrapper">
        <div id="folio-preview-card" class="folio-container pdf-export">
          <div id="folio-preview-container" style="width: 100%; display: flex; flex-direction: column; height: 100%;">
            <!-- Loaded dynamically from template -->
          </div>
        </div>
      </div>
    </main>

  </div>

  <!-- Data & Logic Modules -->
  <script src="calendar_data.js"></script>
  <script src="players_data.js"></script>
  <script src="script.js"></script>
</body>
</html>
